<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Face Attendance</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script defer src="script.js"></script>
    <style>
        :root {
    --primary: #4f46e5;
    --primary-hover: #4338ca;
    --success: #10b981;
    --danger: #ef4444;
    --bg-dark: #0f172a;
    --card-bg: #ffffff;
    --text-main: #1e293b;
    --text-muted: #64748b;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
}

body {
    background-color: #f8fafc;
    background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
    background-size: 20px 20px; /* Subtle grid background */
    color: var(--text-main);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.container {
    background: var(--card-bg);
    width: 100%;
    max-width: 800px;
    padding: 2rem;
    border-radius: 1.5rem;
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
}

h1 {
    text-align: center;
    font-weight: 700;
    font-size: 1.8rem;
    color: var(--primary);
    margin-bottom: 2rem;
    letter-spacing: -0.025em;
}

/* Tab Navigation */
.tabs {
    display: flex;
    gap: 10px;
    background: #f1f5f9;
    padding: 5px;
    border-radius: 12px;
    margin-bottom: 2rem;
}

.tabs button {
    flex: 1;
    border: none;
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    background: transparent;
    color: var(--text-muted);
    font-weight: 600;
    transition: all 0.3s ease;
}

.tabs button:hover {
    color: var(--primary);
}

.tabs button.active {
    background: white;
    color: var(--primary);
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
}

/* Video Styling */
.video-container {
    position: relative;
    width: 100%;
    max-width: 600px;
    margin: 0 auto 1.5rem auto;
    border-radius: 1rem;
    overflow: hidden;
    background: #000;
    line-height: 0;
    box-shadow: 0 0 0 4px #e2e8f0;
}

#video {
    width: 100%;
    height: auto;
    transform: scaleX(-1); /* Mirror effect */
}

#overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

/* Controls & Buttons */
.controls {
    display: flex;
    gap: 15px;
    justify-content: center;
    margin-bottom: 1rem;
}

button {
    padding: 12px 24px;
    border-radius: 8px;
    border: none;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
}

button:active { transform: scale(0.95); }

.btn-in { background: var(--success); color: white; width: 150px; }
.btn-out { background: var(--danger); color: white; width: 150px; }

/* Form Elements */
input[type="text"] {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    margin-bottom: 1rem;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
}

input[type="text"]:focus {
    border-color: var(--primary);
    ring: 2px solid var(--primary);
}

#reg-section button, .search-box button {
    background: var(--primary);
    color: white;
    width: 100%;
}

/* Status Messages */
#scan-status {
    text-align: center;
    font-weight: 500;
    color: var(--text-muted);
    margin-top: 10px;
}

/* Records Table Styling */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 1.5rem;
}

th {
    text-align: left;
    background: #f8fafc;
    padding: 12px;
    color: var(--text-muted);
    font-size: 0.85rem;
    text-transform: uppercase;
}

td {
    padding: 12px;
    border-bottom: 1px solid #f1f5f9;
}

.badge-in { color: var(--success); font-weight: bold; }
.badge-out { color: var(--danger); font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Attendance System</h1>
        
        <div class="tabs">
            <button onclick="showSection('scan-section')">Attendance (Scan)</button>
            <button onclick="showSection('reg-section')">New Registration</button>
            <button onclick="showSection('search-section')">Records</button>
        </div>

        <div id="scan-section" class="content-section">
            <div class="video-container">
                <video id="video" width="600" height="450" autoplay muted></video>
                <canvas id="overlay"></canvas>
            </div>
            <div class="controls">
                <button class="btn-in" onclick="startAutoScan('IN')">Time In</button>
                <button class="btn-out" onclick="startAutoScan('OUT')">Time Out</button>
            </div>
            <div id="scan-status">Waiting for action...</div>
        </div>

        <div id="reg-section" class="content-section" style="display:none;">
            <h3>Register New User</h3>
            <input type="text" id="fname" placeholder="First Name">
            <input type="text" id="lname" placeholder="Last Name">
            <button onclick="registerUser()">Capture & Save</button>
            <div id="reg-status"></div>
        </div>

        <div id="search-section" class="content-section" style="display:none;">
            <input type="text" id="searchQuery" placeholder="Search ID or Name...">
            <button onclick="searchLogs()">Search</button>
            <div id="results-table"></div>
        </div>
    </div>
</body>
</html>
